<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#2c3e50" rx="20"/>
  
  <!-- Musical note stem -->
  <rect x="90" y="40" width="8" height="100" fill="#e74c3c" rx="4"/>
  
  <!-- First note head -->
  <ellipse cx="85" cy="135" rx="24" ry="20" fill="#e74c3c"/>
  
  <!-- Second note head -->
  <ellipse cx="65" cy="155" rx="24" ry="20" fill="#3498db"/>
  
  <!-- Connector beam -->
  <path d="M 98 40 Q 90 50 65 70" stroke="#e74c3c" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>