{% extends "obras/layout.html" %}

{% block title %}Login{% endblock %}

{% block content %}
    <section class="hero">
        <h1>Acesso Restrito</h1>
        <p class="subtitle">Faça login para editar ou criar obras.</p>
    </section>

    <section class="card" style="max-width: 400px; margin: 1rem auto;">
        {% if error %}
            <div style="background-color: #fef3f2; border: 1px solid #f1a7a6; border-radius: 10px; padding: 0.75rem; margin-bottom: 1rem; color: #ba3c3a;">
                {{ error }}
            </div>
        {% endif %}

        <form method="post" class="search-form">
            {% csrf_token %}
            
            <div class="field-grid" style="grid-template-columns: 1fr;">
                <div class="field">
                    <label for="username">Utilizador</label>
                    <input id="username" type="text" name="username" required autofocus>
                </div>

                <div class="field">
                    <label for="password">Palavra-chave</label>
                    <input id="password" type="password" name="password" required>
                </div>
            </div>

            <div class="actions-row">
                <button type="submit" class="back">Entrar</button>
                <a class="back back-secondary" href="{% url 'landing' %}">Cancelar</a>
            </div>
        </form>
    </section>

    <a class="back" href="{% url 'landing' %}">Voltar para início</a>
{% endblock %}
